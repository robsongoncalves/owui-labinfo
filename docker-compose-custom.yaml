# Docker Compose para instalar a imagem customizada do Open WebUI.
#
# Como a imagem esta em um repositorio privado no Docker Hub, execute antes
# no servidor:
#
#   docker login
#
# Depois suba com:
#
#   docker compose -f docker-compose-custom.yaml up -d

services:
  ollama:
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama

  open-webui:
    image: robsongoncalves/owui-custom:${WEBUI_DOCKER_TAG:-0.9.2}
    container_name: open-webui
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"
    environment:
      WEBUI_NAME: ${WEBUI_NAME:-Inteligenciomica}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-troque-esta-chave}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - open-webui:/app/backend/data

volumes:
  ollama: {}
  open-webui: {}
